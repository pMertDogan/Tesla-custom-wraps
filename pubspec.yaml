name: app
description: "Tesla Wrap Studio - AI-powered vehicle wrap design application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP client for AI API calls
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Image manipulation
  image: ^4.2.0

  # Local storage for saving designs
  shared_preferences: ^2.3.0

  # 3D model viewer for web
  model_viewer_plus: ^1.8.0

  # File picker for importing images/logos
  file_picker: ^8.1.0

  # Screenshot capture for export
  screenshot: ^3.0.0

  # Path drawing for freehand tool
  path_drawing: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/cybertruck/
    - assets/cybertruck/example/
    - assets/model3/
    - assets/model3/example/
    - assets/model3-2024-base/
    - assets/model3-2024-base/example/
    - assets/model3-2024-performance/
    - assets/model3-2024-performance/example/
    - assets/modely/
    - assets/modely/example/
    - assets/modely-2025-base/
    - assets/modely-2025-base/example/
    - assets/modely-2025-performance/
    - assets/modely-2025-performance/example/
    - assets/modely-2025-premium/
    - assets/modely-2025-premium/example/
    - assets/modely-l/
    - assets/modely-l/example/
    - modelFiles/
